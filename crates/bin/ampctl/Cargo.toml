[package]
name = "ampctl"
edition.workspace = true
version.workspace = true
license-file.workspace = true
build = "build.rs"

[lib]
name = "ampctl"
path = "src/lib.rs"

[[bin]]
name = "ampctl"
path = "src/main.rs"

[dependencies]
amp-client-admin = { package = "admin-client", path = "../../clients/admin" }
amp-object-store = { path = "../../core/object-store" }
amp-worker-core = { path = "../../core/worker-core" }
anyhow.workspace = true
clap.workspace = true
console = "0.16.1"
chrono.workspace = true
datasets-common = { path = "../../core/datasets-common" }
datasets-derived = { path = "../../core/datasets-derived" }
datasets-raw = { path = "../../core/datasets-raw" }
evm-rpc-datasets = { path = "../../extractors/evm-rpc" }
firehose-datasets = { path = "../../extractors/firehose" }
flate2 = "1"
inferno = "0.12"
monitoring = { path = "../../core/monitoring" }
object_store.workspace = true
reqwest.workspace = true
rustls.workspace = true
serde.workspace = true
serde_json.workspace = true
solana-datasets = { path = "../../extractors/solana" }
tempo-datasets = { path = "../../extractors/tempo" }
thiserror.workspace = true
tokio.workspace = true
urlencoding = "2"
toml.workspace = true
tracing.workspace = true
url.workspace = true
verification = { path = "../../core/verification" }
worker = { path = "../../services/worker" }

[build-dependencies]
vergen-gitcl = { version = "9.0.0", features = ["build"] }
